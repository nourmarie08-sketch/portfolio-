    </section>    <script>
        // ---- Settings Panel ----
        const settingsToggle = document.getElementById('settings-toggle');
        const settingsPanel  = document.getElementById('settings-panel');
        settingsToggle.addEventListener('click', () => {
            settingsToggle.classList.toggle('open');
            settingsPanel.classList.toggle('open');
        });
        document.addEventListener('click', (e) => {
            if (!settingsToggle.contains(e.target) && !settingsPanel.contains(e.target)) {
                settingsToggle.classList.remove('open');
                settingsPanel.classList.remove('open');
            }
        });

        // ---- Dark Mode ----
        const darkToggle = document.getElementById('dark-toggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            darkToggle.checked = true;
        }
        darkToggle.addEventListener('change', () => {
            document.body.classList.toggle('dark', darkToggle.checked);
            localStorage.setItem('theme', darkToggle.checked ? 'dark' : 'light');
        });

        // ---- Font Size (continuous: 70% - 160%) ----
        const MIN_FONT = 10, MAX_FONT = 24, STEP = 1;
        let currentFont = parseInt(localStorage.getItem('fontSize') || '16');
        const indicator = document.getElementById('font-indicator');
        const btnInc    = document.getElementById('font-increase');
        const btnDec    = document.getElementById('font-decrease');

        function applyFont() {
            document.documentElement.style.fontSize = currentFont + 'px';
            const pct = Math.round((currentFont / 16) * 100);
            indicator.textContent = pct + '%';
            btnInc.disabled = currentFont >= MAX_FONT;
            btnDec.disabled = currentFont <= MIN_FONT;
            localStorage.setItem('fontSize', currentFont);
        }
        applyFont();

        btnInc.addEventListener('click', () => { if (currentFont < MAX_FONT) { currentFont += STEP; applyFont(); } });
        btnDec.addEventListener('click', () => { if (currentFont > MIN_FONT) { currentFont -= STEP; applyFont(); } });
    </script>
